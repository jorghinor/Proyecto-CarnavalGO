services:
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend-nextjs:/app
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www
    volumes:
      - ../backend-laravel:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: carnavalgo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"
    command: >
      sh -c "
        if [ ! -f .env ]; then
            cp .env.example .env;
            php artisan key:generate;
        fi;
        php artisan migrate --force;
        php artisan serve --host=0.0.0.0 --port=8000
      "
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: carnavalgo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
